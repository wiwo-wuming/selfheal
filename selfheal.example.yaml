# SelfHeal Example Configuration
# Copy this to selfheal.yaml and customize for your project.

# --- Engine Behaviour ---
engine:
  max_retries: 3             # Max retry attempts per failure
  retry_delay: 1.0            # Seconds between retries
  auto_apply: false           # Set to true to auto-apply patches (DANGEROUS!)
  backup_dir: .selfheal/backups  # Where backups are stored
  strategy_fallback: true     # Try alternative patcher on repeated failure
  experience_enabled: true    # Record & reuse successful fixes via experience store
  experience_db_path: .selfheal/experience.db  # Experience store SQLite path
  max_concurrency: 4          # Max concurrent pipeline runs (1 = sequential)
  async_batch: false          # If true, batch processing uses asyncio parallelism

# --- LLM Provider (optional, for AI-powered classification/patching) ---
llm:
  provider: openai            # openai, deepseek, or anthropic
  model: gpt-4
  # Generic fallback (shared by all providers if no specific key is set):
  api_key: ${OPENAI_API_KEY}
  # Provider-specific keys (preferred over generic api_key):
  # openai_api_key: ${OPENAI_API_KEY}
  # deepseek_api_key: ${DEEPSEEK_API_KEY}
  # anthropic_api_key: ${ANTHROPIC_API_KEY}
  # base_url: https://api.openai.com/v1  # Optional custom endpoint
  # temperature: 0.1  # LLM temperature (default: 0.1)

# --- Watcher (failure detection) ---
watcher:
  type: pytest                # pytest or raw_log
  path: tests/
  pytest_args: ["-v", "--tb=short"]
  poll_interval: 5.0          # Seconds between watch cycles
  watch_patterns: ["*.py"]    # File patterns to watch for changes

# --- Classifier (error categorization) ---
classifier:
  type: rule                  # rule or llm
  # Custom regex rules (optional):
  # rules:
  #   - pattern: "ConnectionError"
  #     category: network

# --- Patcher (fix generation) ---
patcher:
  type: template              # template or llm
  templates_dir: patches/
  # llm:  # Only needed if type=llm
  #   provider: openai
  #   model: gpt-4

# --- Validator (patch verification) ---
validator:
  type: local                 # local or docker
  timeout: 300                # Max validation time in seconds
  # venv_path: .venv          # Optional virtualenv path
  # docker:                   # Only needed if type=docker
  #   image: python:3.11-slim
  #   timeout: 600

# --- Reporter (result notification) ---
reporter:
  type: terminal              # terminal, github, or webhook
  # github:                   # Only needed if type=github
  #   owner: my-org
  #   repo: my-repo
  #   token: ${GITHUB_TOKEN}
  # webhook_url: https://hooks.slack.com/...  # For Slack/Discord notifications

# --- Store (event persistence) ---
store:
  type: memory                # memory or sqlite
  # db_path: .selfheal/selfheal.db  # SQLite database path

# --- Docker (global docker config) ---
