name: SelfHeal - Auto Test Repair

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/selfheal.yml'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'  # Every weekday at 6 AM UTC
  workflow_dispatch:        # Manual trigger

env:
  PYTHON_VERSION: '3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 to suppress deprecation warnings

jobs:
  # -------------------------------------------------------------------
  # Job 1: Run the full test suite to detect failures
  # -------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Run Test Suite

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install project
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=junit.xml --json-report --json-report-file=pytest-results.json -k "not vcr" 2>&1 && echo "failed=false" >> "$GITHUB_OUTPUT" || echo "failed=true" >> "$GITHUB_OUTPUT"

      - name: Run VCR replay tests (no API key needed)
        run: |
          python -m pytest tests/test_llm_vcr.py -v --tb=short 2>&1 || echo "VCR replay partially failed (expecting cassettes)"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            junit.xml
            pytest-results.json
          retention-days: 7

    outputs:
      tests_failed: ${{ steps.pytest.outputs.failed }}

  # -------------------------------------------------------------------
  # Job 2: Self-heal on test failure (runs only if tests failed)
  # -------------------------------------------------------------------
  selfheal:
    needs: test
    if: needs.test.outputs.tests_failed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Self-Heal Repair

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install project with LLM support
        run: |
          pip install -e ".[dev,llm]"

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Extract failures from pytest JSON report
        shell: python
        run: |
          import json
          with open("pytest-results.json") as f:
              report = json.load(f)
          failures = []
          for test in report.get("tests", []):
              if test["outcome"] in ("failed", "error"):
                  longrepr = test.get("call", {}).get("longrepr", "") or ""
                  failures.append({
                      "test_path": test.get("nodeid", ""),
                      "error_type": "AssertionError" if "assert" in longrepr else "RuntimeError",
                      "error_message": longrepr[:500],
                      "traceback": longrepr,
                  })
          with open("failures.json", "w") as f:
              json.dump(failures, f)
          if not failures:
              print("No test failures extracted")

      - name: Run SelfHeal batch repair
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -s failures.json ]; then
            python -m selfheal batch --input failures.json --auto-apply --config selfheal.yaml 2>&1 || echo "SELFHEAL_FAILED=1" >> "$GITHUB_ENV"
          else
            echo "No failures to repair"
          fi

      - name: Retry tests after repair
        if: always()
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=junit-postfix.xml 2>&1 || echo "POSTFIX_FAILED=1" >> "$GITHUB_ENV"

      - name: Generate metrics report
        if: always()
        run: |
          python -m selfheal metrics --json > selfheal-metrics.json

      - name: Upload selfheal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-results
          path: |
            selfheal-metrics.json
            junit-postfix.xml
          retention-days: 7

      - name: Create GitHub Issue on persistent failure
        if: env.POSTFIX_FAILED == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = "## SelfHeal Repair Report\n\nTests still failing after auto-repair attempt.\n\n";
            if (fs.existsSync('selfheal-metrics.json')) {
              const metrics = JSON.parse(fs.readFileSync('selfheal-metrics.json', 'utf8'));
              body += `- **Fix Rate**: ${metrics.fix_rate_pct || 'N/A'}%\n`;
              body += `- **Pipeline Runs**: ${metrics.pipeline_runs || 0}\n`;
              body += `- **Total Failures**: ${metrics.failure_count || 0}\n`;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 SelfHeal: Test failures persist after auto-repair`,
              body: body,
              labels: ['self-heal', 'automated', 'bug']
            });

  # -------------------------------------------------------------------
  # Job 3: SelfHeal health check (always runs)
  # -------------------------------------------------------------------
  health-check:
    needs: [test, selfheal]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: SelfHeal Health Check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install selfheal
        run: pip install -e .

      - name: Verify CLI works
        run: |
          python -m selfheal --version
          python -m selfheal --help

      - name: Verify init generates config
        run: |
          cd /tmp
          python -m selfheal init
          test -f selfheal.yaml && echo "Config generated OK" || (echo "Config missing!" && exit 1)
